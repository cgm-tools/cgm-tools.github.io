<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ion Reference Table — CGM Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@200;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#070b14; --bg2:#0d1526; --bg3:#121e35;
    --accent:#4fc3f7; --accent2:#00e5ff;
    --gold:#ffa726; --green:#66bb6a; --red:#ef5350; --purple:#ab47bc;
    --text:#c8d8f0; --text-dim:#6b82a8;
    --border:rgba(79,195,247,0.15);
    --c0:#c8d8f0; --c1:#4fc3f7; --c2:#26c6da; --c3:#66bb6a;
    --c4:#ffa726; --c5:#ef5350; --c6:#ab47bc; --c7:#f06292;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;}

  nav{position:sticky;top:0;z-index:100;padding:1rem 2rem;background:rgba(7,11,20,.9);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;}
  .nav-logo{font-family:'Space Mono',monospace;font-weight:700;font-size:1.1rem;
    color:var(--accent);text-decoration:none;letter-spacing:.05em;}
  .nav-links{display:flex;gap:2rem;list-style:none;}
  .nav-links a{color:var(--text-dim);text-decoration:none;font-size:.9rem;font-weight:600;
    letter-spacing:.05em;text-transform:uppercase;transition:color .2s;}
  .nav-links a:hover,.nav-links a.active{color:var(--accent);}

  .page-header{padding:2rem 2rem 1.4rem;border-bottom:1px solid var(--border);background:var(--bg2);}
  .page-header h1{font-size:1.8rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.3rem;}
  .page-header p{color:var(--text-dim);font-size:.9rem;}

  /* Filter bar */
  .filter-bar{padding:.85rem 2rem;background:var(--bg2);border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
  .flbl{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--text-dim);
    letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;}
  .el-btns{display:flex;gap:.35rem;flex-wrap:wrap;}
  .el-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);
    font-family:'Space Mono',monospace;font-size:.75rem;padding:.28rem .7rem;
    border-radius:2px;cursor:pointer;transition:all .15s;letter-spacing:.05em;}
  .el-btn:hover{border-color:var(--accent);color:var(--accent);}
  .el-btn.active{background:var(--accent);border-color:var(--accent);color:var(--bg);}

  .search-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);
    font-family:'Space Mono',monospace;font-size:.8rem;padding:.32rem .8rem;
    border-radius:2px;outline:none;width:190px;transition:border-color .2s;}
  .search-input:focus{border-color:var(--accent);}
  .search-input::placeholder{color:var(--text-dim);}

  /* Notes toggle button */
  .notes-toggle{margin-left:auto;background:var(--bg3);border:1px solid var(--border);
    color:var(--text-dim);font-family:'Space Mono',monospace;font-size:.7rem;
    padding:.28rem .8rem;border-radius:2px;cursor:pointer;transition:all .2s;
    letter-spacing:.05em;display:flex;align-items:center;gap:.4rem;white-space:nowrap;}
  .notes-toggle:hover{border-color:var(--accent);color:var(--accent);}
  .notes-toggle.on{border-color:rgba(79,195,247,.4);color:var(--accent);}
  .notes-toggle .nt-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

  /* Legend */
  .legend-bar{padding:.6rem 2rem;background:var(--bg);border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:1.25rem;flex-wrap:wrap;}
  .leg-item{display:flex;align-items:center;gap:.35rem;
    font-family:'Space Mono',monospace;font-size:.65rem;color:var(--text-dim);}
  .leg-dot{width:7px;height:7px;border-radius:50%;}

  /* Content */
  .content{padding:1.5rem 2rem 4rem;}
  .element-block{margin-bottom:2.5rem;}
  .element-header{display:flex;align-items:baseline;gap:1rem;margin-bottom:.85rem;
    padding-bottom:.5rem;border-bottom:1px solid var(--border);}
  .el-sym{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--accent);}
  .el-name{font-size:1rem;font-weight:600;color:var(--text);}
  .el-z{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--text-dim);}

  /* Table */
  .ion-table{width:100%;border-collapse:collapse;font-size:.86rem;}
  .ion-table th{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--text-dim);text-align:left;
    padding:.55rem .75rem;border-bottom:1px solid var(--border);background:var(--bg2);white-space:nowrap;}
  .ion-table td{padding:.6rem .75rem;border-bottom:1px solid rgba(79,195,247,.05);
    vertical-align:top;font-family:'Space Mono',monospace;font-size:.8rem;}
  .ion-table tr:hover td{background:rgba(79,195,247,.04);}

  /* Ion name cell */
  .ion-name-cell{display:flex;align-items:center;gap:.55rem;}
  .ion-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .ion-name{font-weight:700;white-space:nowrap;}
  .ion-charge{font-size:.68rem;color:var(--text-dim);margin-top:.12rem;margin-left:1rem;}

  /* IE cell */
  .ie-eV{color:var(--gold);}
  .ie-sub{display:block;font-size:.68rem;color:var(--text-dim);margin-top:.1rem;}
  .ie-bar-wrap{display:flex;align-items:center;margin-top:.35rem;}
  .ie-bar{height:3px;border-radius:2px;min-width:2px;opacity:.55;}

  /* Transitions cell */
  .trans-line{display:inline-block;background:var(--bg3);border:1px solid rgba(79,195,247,.12);
    border-radius:2px;padding:.08rem .4rem;font-size:.72rem;margin:.08rem .12rem .08rem 0;
    color:var(--accent);white-space:nowrap;}
  .trans-f{color:var(--text-dim);font-size:.67rem;}
  .trans-note{color:var(--gold);font-size:.67rem;}

  /* Notes column — hidden by default, shown when body has .show-notes */
  .col-notes{transition:none;}
  .ion-table th.col-notes,
  .ion-table td.col-notes{display:none;}
  body.show-notes .ion-table th.col-notes,
  body.show-notes .ion-table td.col-notes{display:table-cell;}

  .notes-cell{color:var(--text-dim);font-size:.73rem;max-width:210px;line-height:1.45;}

  .no-results{padding:3rem 0;text-align:center;color:var(--text-dim);
    font-family:'Space Mono',monospace;font-size:.85rem;}
</style>
</head>

<nav>

</div>

const MAX_IE = 900;
const CC = ['#c8d8f0','#4fc3f7','#26c6da','#66bb6a','#ffa726','#ef5350','#ab47bc','#f06292',
            '#ff7043','#78909c','#80cbc4','#ce93d8','#ffcc02','#aed581','#80deea'];
function cc(charge) { return CC[Math.min(charge, CC.length-1)]; }

const EL_NAMES = {H:'Hydrogen',He:'Helium',C:'Carbon',N:'Nitrogen',
  Ne:'Neon',O:'Oxygen',Si:'Silicon',S:'Sulfur',Fe:'Iron'};

// ────────────────────────────────────────────────────
//  RENDER
// ────────────────────────────────────────────────────
function rowHTML(ion) {
  const col = cc(ion.charge);
  const ie = ion.ie_eV != null
    ? `<span class="ie-eV">${ion.ie_eV.toFixed(3)} eV</span>
       <span class="ie-sub">${(ion.ie_eV*96.485).toFixed(1)} kJ/mol · ${(ion.ie_eV/13.6057).toFixed(3)} Ry</span>
       <div class="ie-bar-wrap"><div class="ie-bar" style="width:${Math.max(2,ion.ie_eV/MAX_IE*120)}px;background:${col}"></div></div>`
    : `<span style="color:var(--text-dim)">—</span><span class="ie-sub">fully ionized</span>`;

  const form = ion.form_eV != null ? `${ion.form_eV.toFixed(3)} eV` : '—';

  const trans = ion.transitions.length
    ? ion.transitions.map(t =>
        `<span class="trans-line">${t.lambda.toFixed(1)} Å <span class="trans-f">f=${t.f.toFixed(4)}</span>${t.note?` <span class="trans-note">${t.note}</span>`:''}</span>`
      ).join('')
    : `<span style="color:var(--text-dim);font-size:.72rem">No UV lines</span>`;

  return `<tr>
    <td>
      <div class="ion-name-cell">
        <div class="ion-dot" style="background:${col}"></div>
        <span class="ion-name" style="color:${col}">${ion.name}</span>
      </div>
      <div class="ion-charge">+${ion.charge}</div>
    </td>
    <td>${ie}</td>
    <td style="color:var(--text-dim)">${form}</td>
    <td>${trans}</td>
    <td class="col-notes notes-cell">${ion.notes}</td>
  </tr>`;
}

function render(filterEl, search) {
  const st = (search||'').toLowerCase();
  let html = '', any = false;

  for (const el of IONS) {
    if (filterEl !== 'all' && el.element !== filterEl) continue;
    const filtered = el.ions.filter(ion => {
      if (!st) return true;
      if (ion.name.toLowerCase().includes(st)) return true;
      if (ion.transitions.some(t => String(t.lambda).includes(st))) return true;
      return false;
    });
    if (!filtered.length) continue;
    any = true;
    html += `
      <div class="element-block" data-element="${el.element}">
        <div class="element-header">
          <span class="el-sym">${el.element}</span>
          <span class="el-name">${EL_NAMES[el.element]||el.element}</span>
          <span class="el-z">Z = ${el.Z}</span>
        </div>
        <table class="ion-table">
          <thead><tr>
            <th style="width:100px">Ion</th>
            <th style="width:185px">IE to ionize</th>
            <th style="width:120px">Formation IE</th>
            <th>Key UV transitions (λ_rest, f-value)</th>
            <th class="col-notes" style="width:210px">Notes</th>
          </tr></thead>
          <tbody>${filtered.map(rowHTML).join('')}</tbody>
        </table>
      </div>`;
  }
  document.getElementById('mainContent').innerHTML = any
    ? html
    : '<div class="no-results">No ions match your search.</div>';
}

// ────────────────────────────────────────────────────
//  CONTROLS
// ────────────────────────────────────────────────────
let activeEl    = 'all';
let showingNotes= false;

document.getElementById('elementBtns').addEventListener('click', e => {
  const btn = e.target.closest('.el-btn');
  if (!btn) return;
  document.querySelectorAll('.el-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeEl = btn.dataset.el;
  render(activeEl, document.getElementById('searchInput').value);
});

document.getElementById('searchInput').addEventListener('input', function() {
  render(activeEl, this.value);
});

document.getElementById('notesToggle').addEventListener('click', function() {
  showingNotes = !showingNotes;
  document.body.classList.toggle('show-notes', showingNotes);
  this.classList.toggle('on', showingNotes);
  this.innerHTML = `<span class="nt-dot"></span> ${showingNotes ? 'Hide notes' : 'Show notes'}`;
});

render('all', '');
</script>
